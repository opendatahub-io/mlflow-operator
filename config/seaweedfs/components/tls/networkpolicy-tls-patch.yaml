# JSON 6902 patch: allow ingress on port 8334 (SeaweedFS HTTPS S3) in all three
# existing ingress rules (from profile namespaces, from istio-system, from same namespace).
- op: add
  path: /spec/ingress/0/ports/-
  value:
    port: 8334
- op: add
  path: /spec/ingress/1/ports/-
  value:
    port: 8334
- op: add
  path: /spec/ingress/2/ports/-
  value:
    port: 8334
