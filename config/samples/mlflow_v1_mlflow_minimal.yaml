apiVersion: mlflow.opendatahub.io/v1
kind: MLflow
metadata:
  name: mlflow
spec:
  # Minimal configuration with local storage
  # Suitable for development/testing environments

  # MLflow container image
  image:
    image: quay.io/opendatahub/mlflow:master
    imagePullPolicy: Always

  # Number of replicas
  replicas: 1

  # Compute resources (minimal for development)
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Local file-based storage with PVC
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi

  backendStoreUri: "sqlite:////mlflow/mlflow.db"
  registryStoreUri: "sqlite:////mlflow/mlflow.db"

  # Remote S3 storage for artifacts
  artifactsDestination: "s3://rhods-dsp-dev/artifacts"

  # Default artifact root - where MLflow stores artifacts for runs that don't specify a location
  # If not specified, defaults to artifactsDestination value
  # You can set this to a different location or subdirectory for better organization
  defaultArtifactRoot: "s3://rhods-dsp-dev/artifacts/runs"

  # IMPORTANT: serveArtifacts MUST be enabled when using file-based artifact storage
  serveArtifacts: true

  # Environment variables
  env:
    - name: MLFLOW_LOGGING_LEVEL
      value: DEBUG
