# Auth CRD derived from opendatahub-operator api/services/v1alpha1/auth_types.go
# Source: https://github.com/opendatahub-io/opendatahub-operator/blob/main/api/services/v1alpha1/auth_types.go
# TODO: Replace with a URL reference once the upstream repo publishes generated CRD YAML.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: auths.services.platform.opendatahub.io
spec:
  group: services.platform.opendatahub.io
  names:
    kind: Auth
    listKind: AuthList
    plural: auths
    singular: auth
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
          description: Ready
        - name: Reason
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].reason
          description: Reason
      schema:
        openAPIV3Schema:
          type: object
          description: Auth is the Schema for the auths API
          x-kubernetes-validations:
            - rule: "self.metadata.name == 'auth'"
              message: "Auth name must be auth"
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: AuthSpec defines the desired state of Auth
              properties:
                adminGroups:
                  type: array
                  items:
                    type: string
                  x-kubernetes-validations:
                    - rule: "size(self) > 0"
                      message: "AdminGroups cannot be empty"
                    - rule: "self.all(group, group != 'system:authenticated' && group != '')"
                      message: "AdminGroups cannot contain 'system:authenticated' or empty strings"
                allowedGroups:
                  type: array
                  items:
                    type: string
                  x-kubernetes-validations:
                    - rule: "self.all(group, group != '')"
                      message: "AllowedGroups cannot contain empty strings"
              required:
                - adminGroups
                - allowedGroups
            status:
              type: object
              description: AuthStatus defines the observed state of Auth
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: atomic
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      severity:
                        type: string
      subresources:
        status: {}
