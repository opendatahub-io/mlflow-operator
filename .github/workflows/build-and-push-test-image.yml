name: Build and Push Test Image

# Builds and pushes the mlflow-tests image to quay.io on branch pushes.
#
# Tag scheme:
#   odh/main           -> main
#   odh/release-<TAG>  -> odh-release-<TAG>
#   rhds/main          -> rhds-main
#   rhds/rhoai-<TAG>   -> rhoai-<TAG>

on:
  push:
    branches:
      - main
      - "release-[0-9]*"
      - "rhoai-[0-9]*"
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name to use for image tag'
        required: false
        default: ''

env:
  QUAY_ORG: opendatahub
  QUAY_ID: ${{ secrets.QUAY_ROBOT_USERNAME }}
  QUAY_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}
  IMAGE_REPO: mlflow-tests
  DOCKERFILE_PATH: mlflow-tests/images/test.Dockerfile

jobs:
  build-test-image:
    name: Build and Push Test Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Determine image tag
        id: determine_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BRANCH: ${{ inputs.branch_name }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_BRANCH" ]]; then
            BRANCH_NAME="$INPUT_BRANCH"
          else
            BRANCH_NAME="$REF_NAME"
          fi

          # Sanitize for Docker tag
          TAG_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')

          IS_RHDS=false
          if [[ "$REPO" == red-hat-data-services/* ]]; then
            IS_RHDS=true
          fi

          # Apply prefixes to avoid tag collisions across repos:
          #   RHDS main       -> rhds-main  (distinguish from ODH main)
          #   RHDS rhoai-*    -> rhoai-*    (already namespaced)
          #   ODH  main       -> main       (canonical)
          #   ODH  release-*  -> odh-release-*
          if [[ "$IS_RHDS" == "true" ]]; then
            if [[ ! "$TAG_NAME" =~ ^rhoai- ]]; then
              TAG_NAME="rhds-${TAG_NAME}"
            fi
          else
            if [[ "$TAG_NAME" != "main" ]]; then
              TAG_NAME="odh-${TAG_NAME}"
            fi
          fi

          {
            echo "branch_name=${BRANCH_NAME}"
            echo "tag_name=${TAG_NAME}"
            echo "full_image=quay.io/${{ env.QUAY_ORG }}/${{ env.IMAGE_REPO }}:${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          echo "Building image for branch: $BRANCH_NAME"
          echo "Docker tag: $TAG_NAME"
          echo "Full image: quay.io/${{ env.QUAY_ORG }}/${{ env.IMAGE_REPO }}:${TAG_NAME}"

      - name: Build and push test image
        uses: ./.github/actions/build
        env:
          TARGET_IMAGE_TAG: ${{ steps.determine_tag.outputs.tag_name }}
          SOURCE_BRANCH: ${{ steps.determine_tag.outputs.branch_name }}
        with:
          OVERWRITE: true
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          DOCKERFILE: ${{ env.DOCKERFILE_PATH }}
          GH_REPO: ${{ github.repository }}
          QUAY_ORG: ${{ env.QUAY_ORG }}
          QUAY_ID: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Test Image Build Summary"
            echo ""
            echo "**Branch:** ${{ steps.determine_tag.outputs.branch_name }}"
            echo "**Image Tag:** ${{ steps.determine_tag.outputs.tag_name }}"
            echo "**Full Image:** \`${{ steps.determine_tag.outputs.full_image }}\`"
            echo ""
            echo "**Status:** ✅ Built and pushed successfully"
          } >> "$GITHUB_STEP_SUMMARY"
