name: Deploy MLflow on Kind

env:
  NAMESPACE: 'opendatahub'
  CLUSTER_NAME: 'mlflow'

on:
  workflow_dispatch:
    inputs:
      backend_store:
        description: 'Backend store type'
        required: false
        default: 'sqlite'
        type: choice
        options:
          - sqlite
          - postgres

      artifact_storage:
        description: 'Artifact storage type'
        required: false
        default: 'file'
        type: choice
        options:
          - file
          - s3

      create_users:
        description: 'Create test users with RBAC'
        required: false
        default: true
        type: boolean

  push:
    paths:
      - 'config/**'
      - '.github/actions/deploy/**'
    branches:
      - main

  pull_request:
    paths:
      - 'config/**'
      - '.github/actions/deploy/**'

jobs:
  deploy-mlflow:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: kubeflow/pipelines/.github/actions/github-disk-cleanup@master

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.12.0
        id: cluster-create
        with:
          version: v0.29.0
          node_image: kindest/node:v1.34.0
          cluster_name: ${{ inputs.cluster_name || env.NAMESPACE }}

      - name: Deploy MLflow
        id: deploy-mlflow
        uses: ./.github/actions/deploy
        with:
          namespace: ${{ env.NAMESPACE }}
          target_branch: ${{ github.head_ref || github.ref_name }}
          backend_store: ${{ inputs.backend_store || 'sqlite' }}
          artifact_storage: ${{ inputs.artifact_storage || 'file' }}

      - name: Create test users
        if: ${{ inputs.create_users != false }}
        run: |
          cd .github/resources/scripts
          python user_manager.py --cluster-name ${{ inputs.cluster_name || env.NAMESPACE }} --mlflow-namespace ${{ steps.deploy-mlflow.outputs.namespace }}

      - name: Verify deployment
        run: |
          echo "✅ MLflow deployed successfully!"
          echo "📍 Namespace: ${{ steps.deploy-mlflow.outputs.namespace }}"
          echo "🌐 MLflow URL: ${{ steps.deploy-mlflow.outputs.mlflow_url }}"

          # Verify MLflow is running
          kubectl get pods -n ${{ steps.deploy-mlflow.outputs.namespace }}
          kubectl get svc -n ${{ steps.deploy-mlflow.outputs.namespace }}

      - name: Port forward MLflow (for manual testing)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "🎯 Setting up port forwarding..."
          echo "Run this command to access MLflow:"
          echo "kubectl port-forward service/mlflow 8080:5000 -n ${{ steps.deploy-mlflow.outputs.namespace }}"
          echo "Then visit: http://localhost:8080"

      - name: Run basic smoke tests
        run: |
          # Wait for MLflow to be fully ready
          kubectl wait --for=condition=ready pod -l app=mlflow --timeout=300s -n ${{ steps.deploy-mlflow.outputs.namespace }}

          # Test MLflow service is accessible
          kubectl port-forward service/mlflow 8080:5000 -n ${{ steps.deploy-mlflow.outputs.namespace }} &
          sleep 10

          # Simple health check
          curl -f http://localhost:8080/health || echo "⚠️  Health check failed - manual verification needed"

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "🧹 Cleaning up failed deployment..."
          kubectl get all -n ${{ steps.deploy-mlflow.outputs.namespace }} || true
          kubectl describe pods -n ${{ steps.deploy-mlflow.outputs.namespace }} || true