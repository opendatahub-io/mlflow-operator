name: Operator Chaos

on:
  pull_request:
    paths:
      - "api/**"
      - "cmd/**"
      - "config/**"
      - "internal/config/**"
      - "internal/controller/**"
      - "charts/mlflow/**"
      - "chaos/knowledge/**"
      - ".github/scripts/operator-chaos-*.sh"
      - ".github/workflows/operator-chaos.yml"
      - ".github/workflows/operator-chaos-pr-comment.yml"

permissions:
  contents: read

env:
  OPERATOR_CHAOS_VERSION: "9e6ac9668b9aaca2f0f2ddf169867862b7925b80"

jobs:
  operator-chaos:
    name: Operator Chaos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install operator-chaos
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          GOBIN="${RUNNER_TEMP}/bin" go install "github.com/opendatahub-io/operator-chaos/cmd/operator-chaos@${OPERATOR_CHAOS_VERSION}"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Checkout base branch assets
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch
          persist-credentials: false
          sparse-checkout: |
            chaos/knowledge
            config/crd/bases/mlflow.opendatahub.io_mlflows.yaml
          sparse-checkout-cone-mode: false

      - name: Run operator-chaos checks
        id: checks
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/operator-chaos-run-checks.sh \
            "${RUNNER_TEMP}/operator-chaos" \
            "base-branch/chaos/knowledge" \
            "chaos/knowledge" \
            "base-branch/config/crd/bases/mlflow.opendatahub.io_mlflows.yaml" \
            "config/crd/bases/mlflow.opendatahub.io_mlflows.yaml"

      - name: Write operator-chaos summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          source "${RUNNER_TEMP}/operator-chaos/outcomes.env"
          export VALIDATE_OUTCOME PREFLIGHT_OUTCOME KNOWLEDGE_DIFF_OUTCOME CRD_DIFF_OUTCOME SIMULATE_OUTCOME
          bash .github/scripts/operator-chaos-summary.sh "${RUNNER_TEMP}/operator-chaos" > "${RUNNER_TEMP}/operator-chaos-summary.md"
          tee -a "${GITHUB_STEP_SUMMARY}" < "${RUNNER_TEMP}/operator-chaos-summary.md"

      - name: Fail on operator-chaos errors
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          source "${RUNNER_TEMP}/operator-chaos/outcomes.env"
          for outcome in \
            "${VALIDATE_OUTCOME}" \
            "${PREFLIGHT_OUTCOME}" \
            "${KNOWLEDGE_DIFF_OUTCOME}" \
            "${CRD_DIFF_OUTCOME}" \
            "${SIMULATE_OUTCOME}"; do
            if [[ "${outcome}" == "failure" ]]; then
              echo "operator-chaos workflow encountered a command error."
              exit 1
            fi
          done
